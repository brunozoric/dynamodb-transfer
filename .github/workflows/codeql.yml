name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: github/codeql-action/init@v3.35.3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/autobuild@v3.35.3

      - uses: github/codeql-action/analyze@v3.35.3
        with:
          category: "/language:javascript-typescript"
