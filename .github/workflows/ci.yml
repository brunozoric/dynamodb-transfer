name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: yarn --immutable

      - name: Format check
        run: yarn format:check

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn ts-check

      - name: Test
        run: yarn test
